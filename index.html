<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js" integrity="sha384-GFr3yTh5lJznCbZfpTtXnwboFsxqtTQoeTZCRHhE0579KrRmlCzen5AA8ohaB5ug" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root" class="stage"></div>

  <script>
    // Nuke escape hatch — visit /?nuke=1 to unregister all service workers,
    // wipe every cache, and clear stored version. Hoisted ABOVE the babel
    // script tags so it still runs even if a wedged jsx file crashes the
    // app boot — that's exactly when users need the escape hatch most.
    try {
      if (location.search.includes('nuke=1')) {
        Promise.all([
          'serviceWorker' in navigator
            ? navigator.serviceWorker.getRegistrations().then(rs => Promise.all(rs.map(r => r.unregister())))
            : Promise.resolve(),
          'caches' in window
            ? caches.keys().then(ks => Promise.all(ks.map(k => caches.delete(k))))
            : Promise.resolve(),
        ]).finally(() => {
          try { localStorage.removeItem('app_version'); } catch {}
          // Redirect with a timestamp cache-buster so Safari's HTTP cache
          // (GH Pages serves index.html with max-age=600) can't pin us
          // to the stale page after the SW + caches API are wiped.
          location.replace(location.pathname + '?cb=' + Date.now());
        });
        // Stop further script execution this load — the redirect handles
        // the next page view with a clean URL + fresh fetches.
        throw new Error('nuke');
      }
    } catch {}
  </script>

  <script>
    // In-app debug console — visit /?debug=1 (or chain with ?nuke=1&debug=1)
    // to see a floating panel of console.log/error/warn output. Captures
    // every message from boot onward into a ring buffer. For Jake to
    // diagnose map rendering without Safari Web Inspector.
    (function () {
      try {
        if (!location.search.includes('debug=1')) return;
        const buf = [];
        const MAX = 200;
        const orig = { log: console.log, warn: console.warn, error: console.error };
        const fmt = (args) => Array.prototype.map.call(args, (a) => {
          if (a instanceof Error) return a.message + '\n' + (a.stack || '');
          if (typeof a === 'object') { try { return JSON.stringify(a, null, 2); } catch { return String(a); } }
          return String(a);
        }).join(' ');
        ['log', 'warn', 'error'].forEach((k) => {
          console[k] = function () {
            buf.push({ k, m: fmt(arguments), t: Date.now() });
            while (buf.length > MAX) buf.shift();
            paint();
            return orig[k].apply(console, arguments);
          };
        });
        window.addEventListener('error', (e) => {
          buf.push({ k: 'error', m: '[window.error] ' + (e.message || '?') + ' @ ' + (e.filename || '?') + ':' + (e.lineno || '?'), t: Date.now() });
          paint();
        });
        window.addEventListener('unhandledrejection', (e) => {
          buf.push({ k: 'error', m: '[unhandled] ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason)), t: Date.now() });
          paint();
        });
        const panel = document.createElement('div');
        // Pinned to TOP of viewport, below the iOS status strip — was at
        // bottom but covered the tab bar so users couldn't tap MAP/ME/etc.
        panel.style.cssText =
          'position:fixed;left:8px;right:8px;top:60px;max-height:30vh;z-index:99999;' +
          'background:rgba(6,4,18,0.94);color:#f7ede0;' +
          'border:1px solid rgba(247,237,224,0.35);border-radius:10px;' +
          'font-family:ui-monospace,Menlo,monospace;font-size:10.5px;line-height:1.35;' +
          'padding:6px 8px;overflow:auto;backdrop-filter:blur(6px);';
        const close = document.createElement('button');
        close.textContent = 'CLOSE';
        close.style.cssText =
          'position:absolute;top:4px;right:6px;background:#e85d2e;color:#fff;border:none;' +
          'padding:3px 7px;border-radius:4px;font:600 9px/1 ui-monospace,monospace;letter-spacing:1px;cursor:pointer;';
        close.onclick = () => panel.remove();
        let attached = false;
        function paint() {
          if (!attached && document.body) {
            document.body.appendChild(panel);
            panel.appendChild(close);
            attached = true;
          }
          if (!attached) return;
          const colors = { log: '#f7ede0', warn: '#fbbf24', error: '#f87171' };
          panel.querySelectorAll('.l').forEach((n) => n.remove());
          buf.slice(-60).forEach((entry) => {
            const div = document.createElement('div');
            div.className = 'l';
            div.style.cssText = 'color:' + colors[entry.k] + ';padding:2px 0;white-space:pre-wrap;border-bottom:1px solid rgba(247,237,224,0.08);';
            const ts = new Date(entry.t).toISOString().slice(11, 19);
            div.textContent = '[' + ts + ' ' + entry.k.toUpperCase() + '] ' + entry.m;
            panel.appendChild(div);
          });
          panel.scrollTop = panel.scrollHeight;
        }
        // Paint once body is ready, in case console fires before <body>.
        if (document.body) paint();
        else document.addEventListener('DOMContentLoaded', paint);
        console.log('[plursky-debug] panel armed. v=' + (document.querySelector('script[src*=app]')?.src?.match(/v=v\d+/)?.[0] || '?'));
      } catch (e) { /* never let debug break the app */ }
    })();
  </script>

  <script type="text/babel" src="ios-frame.jsx?v=v147"></script>
  <script type="text/babel" src="data.jsx?v=v147"></script>
  <script type="text/babel" src="supabase.jsx?v=v147"></script>
  <script type="text/babel" src="chrome.jsx?v=v147"></script>
  <script type="text/babel" src="home.jsx?v=v147"></script>
  <script type="text/babel" src="map.jsx?v=v147"></script>
  <script type="text/babel" src="lineup.jsx?v=v147"></script>
  <script type="text/babel" src="artist.jsx?v=v147"></script>
  <script type="text/babel" src="spotify.jsx?v=v147"></script>
  <script type="text/babel" src="app.jsx?v=v147"></script>

  <script>

    // Build version stamp â€” bumped on every deploy that changes app behaviour.
    // If the running tab's stored version doesn't match, force a full reload
    // (bypassing browser HTTP cache that GH-Pages serves with max-age=600).
    const APP_VERSION = 'v147';
    try {
      const stored = localStorage.getItem('app_version');
      if (stored && stored !== APP_VERSION) {
        localStorage.setItem('app_version', APP_VERSION);
        if ('caches' in window) {
          // Wipe app caches on version bump, but keep the LVMS map tile
          // cache so users don't re-download the festival basemap when
          // we ship a new app version mid-event.
          caches.keys().then(ks => Promise.all(
            ks.filter(k => !k.startsWith('plursky-tiles-')).map(k => caches.delete(k))
          )).then(() => location.reload());
        } else { location.reload(); }
      } else if (!stored) {
        localStorage.setItem('app_version', APP_VERSION);
      }
    } catch {}

    if ('serviceWorker' in navigator) {
      caches.keys().then(keys =>
        Promise.all(
          keys.filter(k => k !== 'plursky-v147' && !k.startsWith('plursky-tiles-'))
              .map(k => caches.delete(k))
        )
      ).then(() =>
        navigator.serviceWorker.register('./sw.js?v=v147', { updateViaCache: 'none' })
          .then(reg => { try { reg.update(); } catch {} })
      );

      // (Removed the controllerchange auto-reload. It caused a second
      // visible reload after the version-stamp cache wipe: page load →
      // wipe + reload → SW reinstalls → controllerchange → ANOTHER
      // reload. Jake's "loads for a sec then goes blank then reloads"
      // was that double reload. SW network-first strategy in sw.js
      // already delivers fresh JS on the next navigation; we don't
      // need to force-reload on SW takeover.)
    }
  </script>
</body>
</html>
