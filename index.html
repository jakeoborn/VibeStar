<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  .no-scrollbar::-webkit-scrollbar{display:none}
  .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
  html,body{width:100%;min-height:100%;background:#0d0a08;font-family:'Geist',system-ui,sans-serif;color:#f4ece2;overflow-x:hidden}
  body{display:flex;align-items:center;justify-content:center;padding:24px 12px;min-height:100vh}
  .stage{display:flex;align-items:center;justify-content:center;width:100%}
  .serif{font-family:'Instrument Serif',serif;font-weight:400}
  .mono{font-family:'Geist Mono',monospace}

  /* --- Plursky inside-screen palette --- */
  :root{
    --ink:#1a120d;
    --paper:#f7ede0;
    --paper-2:#eee0cb;
    --dune:#d9bf94;
    --ember:#e85d2e;
    --flare:#f59a36;
    --horizon:#7b3d9a;
    --night:#1a1030;
    --dusk:#2a1a3d;
    --sky:#6f8fb8;
    --line:rgba(26,18,13,0.12);
    --line-2:rgba(26,18,13,0.22);
    --muted:rgba(26,18,13,0.55);
    --success:#2d7a55;
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root" class="stage"></div>

  <script type="text/babel" src="ios-frame.jsx?v=v71"></script>
  <script type="text/babel" src="data.jsx?v=v71"></script>
  <script type="text/babel" src="supabase.jsx?v=v71"></script>
  <script type="text/babel" src="chrome.jsx?v=v71"></script>
  <script type="text/babel" src="home.jsx?v=v71"></script>
  <script type="text/babel" src="map.jsx?v=v71"></script>
  <script type="text/babel" src="lineup.jsx?v=v71"></script>
  <script type="text/babel" src="artist.jsx?v=v71"></script>
  <script type="text/babel" src="spotify.jsx?v=v71"></script>
  <script type="text/babel" src="app.jsx?v=v71"></script>

  <script>
    // Build version stamp — bumped on every deploy that changes app behaviour.
    // If the running tab's stored version doesn't match, force a full reload
    // (bypassing browser HTTP cache that GH-Pages serves with max-age=600).
    const APP_VERSION = 'v71';
    try {
      const stored = localStorage.getItem('app_version');
      if (stored && stored !== APP_VERSION) {
        localStorage.setItem('app_version', APP_VERSION);
        if ('caches' in window) {
          caches.keys().then(ks => Promise.all(ks.map(k => caches.delete(k))))
            .then(() => location.reload());
        } else { location.reload(); }
      } else if (!stored) {
        localStorage.setItem('app_version', APP_VERSION);
      }
    } catch {}

    if ('serviceWorker' in navigator) {
      caches.keys().then(keys =>
        Promise.all(keys.filter(k => k !== 'vibestar-v71').map(k => caches.delete(k)))
      ).then(() =>
        navigator.serviceWorker.register('./sw.js?v=v71', { updateViaCache: 'none' })
          .then(reg => { try { reg.update(); } catch {} })
      );

      let _reloaded = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (_reloaded) return;
        _reloaded = true;
        window.location.reload();
      });
    }
  </script>
</body>
</html>
